<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="AI-assisted pediatric malnutrition screening.">
    <title>{% block title %}Pediatric Nutrition Screening{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('web.index') }}">Nutri<span>Check</span></a>
      <p>AI-assisted pediatric nutrition screening</p>
    </header>

    <main class="page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>This tool supports screening and does not replace assessment by a qualified healthcare professional.</p>
    </footer>
  </body>
</html>
