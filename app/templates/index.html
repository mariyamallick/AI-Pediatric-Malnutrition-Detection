<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Pediatric Malnutrition Detection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>AI Pediatric Malnutrition Detection</h1>

<p class="subtitle">
Enter the child's measurements to assess nutritional status.
</p>

<form action="/predict" method="POST">

<label>Age (Months)</label>

<input type="number" name="age_months" required>

<label>Sex</label>

<select name="sex" required>

<option value="">Select</option>

<option value="0">Female</option>

<option value="1">Male</option>

</select>

<label>Weight (kg)</label>

<input type="number" step="0.1" name="weight_kg" required>

<label>Height (cm)</label>

<input type="number" step="0.1" name="height_cm" required>

<label>MUAC (cm)</label>

<label>MUAC (cm) - Optional</label>
<input
    type="number"
    name="muac_cm"
    step="0.1"
    placeholder="Optional"
>

<label>Wealth Index</label>

<select name="wealth_index" required>
    <option value="1">Lowest</option>
    <option value="2">Second</option>
    <option value="3">Middle</option>
    <option value="4">Fourth</option>
    <option value="5">Highest</option>
</select>

<label>Mother's Education</label>

<select name="mother_education" required>
    <option value="0">No Education</option>
    <option value="1">Primary</option>
    <option value="2">Secondary</option>
    <option value="3">Higher</option>
</select>

<label>Currently Breastfeeding</label>

<select name="currently_breastfeeding" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<button type="submit">

Run Nutrition Screening

</button>

</form>

</div>

</body>

</html>
